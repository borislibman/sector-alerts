name: Sector Spread Alerts

on:
  schedule:
    - cron: "35 13 * * 1-5"
    - cron: "35 20 * * 1-5"
  workflow_dispatch:

jobs:
  run-alerts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sector alert
        env:
          ALERT_PERIOD:    ${{ vars.ALERT_PERIOD || '1mo' }}
          ALERT_INTERVAL:  ${{ vars.ALERT_INTERVAL || '1d' }}
          ALERT_THRESHOLD: ${{ vars.ALERT_THRESHOLD || '2.0' }}
          REVERSAL_MIN:    ${{ vars.REVERSAL_MIN || '1.0' }}
          COOLDOWN_HRS:    ${{ vars.COOLDOWN_HRS || '20.0' }}
          DESKTOP_ALERTS:  "false"
          STATE_FILE:      sector_state.json
          SMTP_HOST:       smtp.gmail.com
          SMTP_PORT:       "587"
          SMTP_USER:       ${{ secrets.SMTP_USER }}
          SMTP_PASS:       ${{ secrets.SMTP_PASS }}
          ALERT_EMAIL_TO:  ${{ secrets.ALERT_EMAIL_TO }}
	  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}	
        run: python sector_alert.py

      - name: Commit updated state file
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ github.token }}@github.com/borislibman/sector-alerts.git
          git add sector_state.json
          git diff --staged --quiet || git commit -m "chore: update sector state [skip ci]"
          git push