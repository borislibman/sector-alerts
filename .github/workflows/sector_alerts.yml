- name: Commit updated state file
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/borislibman/sector-alerts.git
          git add sector_state.json
          git diff --staged --quiet \
            || git commit -m "chore: update sector state $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
          git push